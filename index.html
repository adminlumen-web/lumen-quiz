<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Initial Test - Lumen Choir</title>
    <style>
        :root { --primary-color: #1e3a8a; --secondary-color: #3b82f6; --success-color: #10b981; --error-color: #ef4444; --text-color: #1f2937; --bg-color: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h1 { color: var(--primary-color); font-size: 24px; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; }
        .btn-start { width: 100%; margin-top: 10px; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .progress-container { display: flex; justify-content: space-between; font-size: 14px; color: var(--secondary-color); font-weight: 600; margin-bottom: 10px; }
        .category-tag { background: #eff6ff; color: var(--secondary-color); padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .answers-grid { display: flex; flex-direction: column; gap: 12px; }
        .btn-ans { padding: 14px; border: 2px solid #e5e7eb; border-radius: 8px; background: white; text-align: left; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-ans.correct { background-color: #ecfdf5; border-color: var(--success-color); color: #065f46; font-weight: bold; }
        .btn-ans.wrong { background-color: #fef2f2; border-color: var(--error-color); color: #991b1b; }
        .explanation { margin-top: 20px; padding: 15px; background-color: #f9fafb; border-left: 4px solid var(--secondary-color); border-radius: 4px; display: none; }
        .btn-next { width: 100%; margin-top: 20px; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; display: none; cursor: pointer; }
        .result-screen { text-align: center; display: none; }
        .score { font-size: 48px; font-weight: bold; color: var(--primary-color); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="login-screen">
            <h1>LUMEN CHOIR</h1>
            <div class="subtitle">Khảo sát kiến thức nhạc lý & phụng vụ cơ bản</div>
            <div class="form-group"><label>Họ và Tên:</label><input type="text" id="username" placeholder="Nhập họ và tên..." required></div>
            <div class="form-group"><label>Email:</label><input type="email" id="useremail" placeholder="Nhập email..." required></div>
            <button class="btn-start" onclick="startQuiz()">BẮT ĐẦU THỰC HIỆN</button>
        </div>
        <div id="quiz-screen" style="display: none;">
            <div class="progress-container"><span id="progress-text"></span><span id="category-text" class="category-tag"></span></div>
            <div class="question" id="question-text"></div>
            <div class="answers-grid" id="answers-container"></div>
            <div class="explanation" id="explanation-box"><strong>Giải thích:</strong><p id="explanation-text"></p></div>
            <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo</button>
        </div>
        <div id="result-screen" class="result-screen">
            <h1>Kết quả khảo sát</h1>
            <div class="score" id="score-text"></div>
            <div id="performance-feedback" style="margin-bottom: 20px; font-weight: 600;"></div>
            <div id="sync-status" style="font-size: 12px; margin-bottom: 15px;"></div>
            <button class="btn-start" onclick="location.reload()">Làm lại bài khảo sát</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt_eB5BRVjWwZDCzziXwKZ5FWGF18WHcpe9BeKm-QWRMvXf_advLudjMxGaIVJgGe-/exec";
        const allQuestions = [{id:1,category:"Diction",question:"Tại sao phải mở khẩu hình theo chiều dọc khi hát các nguyên âm như 'O' hoặc 'A'?",answers:["Để tạo ra âm thanh nhẹ nhàng hơn.","Để dễ dàng thay đổi cao độ.","Để tạo không gian vang tốt hơn và giúp âm thanh không bị bẹt hoặc chói.","Vì đó là thói quen của người hát opera."],correctAnswer:"Để tạo không gian vang tốt hơn và giúp âm thanh không bị bẹt hoặc chói.",explanation:"Mở khẩu hình dọc giúp tối ưu hóa khoang cộng hưởng truyền âm."}]; // ... more questions
        let userName = "", userEmail = "", quizData = [], currentQuestionIndex = 0, score = 0, answered = false;
        function startQuiz() {
            userName = document.getElementById("username").value.trim();
            userEmail = document.getElementById("useremail").value.trim();
            if(!userName || !userEmail) return alert("Vui lòng nhập đầy đủ thông tin!");
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            quizData = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 30);
            loadQuestion();
        }
        function loadQuestion() {
            answered = false; let q = quizData[currentQuestionIndex];
            document.getElementById("btn-next").style.display = "none";
            document.getElementById("explanation-box").style.display = "none";
            document.getElementById("progress-text").innerText = `Câu hỏi ${currentQuestionIndex + 1}/${quizData.length}`;
            document.getElementById("category-text").innerText = q.category;
            document.getElementById("question-text").innerText = q.question;
            let container = document.getElementById("answers-container"); container.innerHTML = "";
            q.answers.forEach(ans => {
                let btn = document.createElement("button"); btn.className = "btn-ans"; btn.innerText = ans;
                btn.onclick = () => { if(answered) return; answered = true; 
                    if(ans === q.correctAnswer) { btn.classList.add("correct"); score++; } else { btn.classList.add("wrong"); }
                    document.getElementById("explanation-text").innerText = q.explanation;
                    document.getElementById("explanation-box").style.display = "block";
                    document.getElementById("btn-next").style.display = "block"; };
                container.appendChild(btn); });
        }
        function nextQuestion() { currentQuestionIndex++; if(currentQuestionIndex < quizData.length) loadQuestion(); else showResults(); }
        function showResults() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("score-text").innerText = `${score}/${quizData.length}`;
            sendDataToGoogleSheet();
        }
        function sendDataToGoogleSheet() {
            let status = document.getElementById("sync-status");
            let formData = new FormData(); formData.append("name", userName); formData.append("email", userEmail); formData.append("score", `${score}/${quizData.length}`);
            fetch(SCRIPT_URL, { method: "POST", body: formData })
            .then(() => status.innerText = "✅ Đã lưu kết quả thành công!")
            .catch(() => status.innerText = "❌ Lỗi lưu kết quả, vui lòng chụp màn hình!");
        }
    </script>
</body>
</html>
